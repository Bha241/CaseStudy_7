name: Spark Energy Consumption Analytics CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyspark numpy pytest fastapi uvicorn matplotlib pandas

    - name: Run Tests
      env:
        PYTHONPATH: .
      run: |
        pytest tests/

  build-docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker Image
      run: |
        docker build . --file Dockerfile --tag energy-analytics:latest

  validate-k8s:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Dry Run Kubernetes Manifests
      run: |
        # Validate syntax of deployment and service manifests
        kubectl apply --dry-run=client -f k8s/deployment.yaml
        kubectl apply --dry-run=client -f k8s/service.yaml
